<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>
    {% if page.title %} {{ page.title }} {% else %} {{ site.title }} {% endif %}
  </title>

  {% seo title=false %} {% feed_meta %}

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="{{ site.url }}{{ page.url }}" />
  <meta property="og:title" content="{{ site.title }}" />
  <meta
    property="og:description"
    content="Naive hacker | CEO and founder of Strat | Co-founder of the W3HC | Volunteer at Emmaüs Connect"
  />
  <meta
    property="og:image"
    content="{{ site.url }}/assets/images/favicon/android-chrome-512x512.png"
  />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="{{ site.url }}{{ page.url }}" />
  <meta property="twitter:title" content="{{ site.title }}" />
  <meta
    property="twitter:description"
    content="Naive hacker | CEO and founder of Strat | Co-founder of the W3HC | Volunteer at Emmaüs Connect"
  />
  <meta
    property="twitter:image"
    content="{{ site.url }}/assets/images/favicon/android-chrome-512x512.png"
  />

  <!-- Favicon -->
  <link
    rel="apple-touch-icon"
    sizes="180x180"
    href="/assets/images/favicon/apple-touch-icon.png"
  />
  <link
    rel="icon"
    type="image/png"
    sizes="32x32"
    href="/assets/images/favicon/favicon-32x32.png"
  />
  <link
    rel="icon"
    type="image/png"
    sizes="16x16"
    href="/assets/images/favicon/favicon-16x16.png"
  />
  <link rel="manifest" href="/assets/images/favicon/site.webmanifest" />
  <link
    rel="mask-icon"
    href="/assets/images/favicon/safari-pinned-tab.svg"
    color="#5bbad5"
  />
  <link rel="shortcut icon" href="/assets/images/favicon/favicon.ico" />
  <meta name="msapplication-TileColor" content="#00aba9" />
  <meta
    name="msapplication-config"
    content="/assets/images/favicon/browserconfig.xml"
  />
  <meta name="theme-color" content="#ffffff" />
  <!-- Favicon -->

  <link rel="stylesheet" href="{{ "/assets/css/main.css" | relative_url }}" />
  {% if site.theme_config.appearance_toggle %} {% include toggle_theme_js.html
  %} {% endif %} {%- include custom_head.html -%}
</head>
